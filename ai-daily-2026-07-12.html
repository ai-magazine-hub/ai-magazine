<script>
const DATA = {"meta": {"reportDate": "2026-07-12", "reportDateHuman": "2026年7月12日", "weekday": "星期日", "total": 8, "source": "AI HOT", "sourceUrl": "https://aihot.virxact.com", "generatedAt": "2026年07月14日 17:28"}, "sections": [{"label": "模型发布/更新", "color": "#4f46e5", "items": [{"seq": 1, "title": "蚂蚁集团 Robbyant 发布 LingBot-VA 2.0，首个原生具身基础模型", "source": "MarkTechPost（RSS）", "summary": "蚂蚁集团旗下具身智能团队 Robbyant 发布 LingBot-VA 2.0，首个原生具身基础模型。该模型采用因果 …", "url": "https://www.marktechpost.com/2026/07/11/ant-groups-robbyant-unveils-lingbot-va-2-0", "publishedAt": "2026-07-11T07:56:11.000Z", "exact": true, "content": "Robbyant, the embodied AI unit inside Ant Group, has released the LingBot-VA 2.0.The first embodied-native foundation model. It describes a video-action foundation model for generalist robot manipulation. The research team pretrains the whole stack for embodiment instead of fine-tuning a video generator.\nWhat is LingBot-VA 2.0?\nMost video-action models reuse two components built for digital content creation. One is a reconstruction-oriented VAE. The other is a bidirectional video-diffusion backbone, with an action module attached.\nThis creates three limitations. Pixel-reconstruction latents preserve appearance but carry limited physical structure. Iterative denoising over video tokens is too slow for closed-loop control. Generic video objectives never teach how actions reshape the world.\nA fourth mismatch is structural. Backbones use bidirectional attention, while control unfolds strictly forward in time. LingBot VA Version 1.0 finetuned that stack into a causal model. Version 2.0 pretrains a causal DiT natively.\n\nVersion 1: The Semantic Visual-Action Tokenizer\nBuilding on that motivation, stage one replaces the compression-only VAE. Following RepWAM, the tokenizer adds two objectives to reconstruction.\nSemantic alignment pulls visual latents toward a frozen Perception Encoder teacher. A latent-action objective extracts compact transition variables between consecutive latents. An inverse dynamics model predicts each latent action. A forward dynamics model decodes it into a transport map plus residual.\nWorld states and actions now share one latent space. Unlabeled web video therefore carries action-relevant supervision.\nVersion 2: A Causal DiT With a Sparse MoE Video Stream\nOn top of that space, version 2 pretrains a causal DiT. It keeps the Mixture-of-Transformers layout of version 1.0. A video expert and an action expert share one causal self-attention. Each owns a separate feed-forward pathway.\nThe two streams scale asymmetrically. The video expert replaces its dense FFN with a sparse MoE routed layer. That layer holds 128 routed SwiGLU experts, top-8 routing, one shared expert. Load balancing follows the auxiliary-loss-free Loss-Free Balancing strategy. The action expert keeps a dense FFN at hidden dimension 768.\nThe video backbone is roughly 13.0B parameters, about 1.9B active. With the action expert and MCP heads, training covers about 15.3B parameters. Roughly 2.5B activate per token at inference. Training uses a rectified-flow objective with a hybrid Muon plus AdamW optimizer.\nWhere the Training Signal Comes From\nBeyond architecture, two objectives shape what the model learns.\nMulti-chunk prediction (MCP) fixes myopic supervision. Teacher forcing supervises only the next chunk, so the model can cut loss by copying appearance. MCP attaches three lightweight modules predicting the next three chunks. In ablation it matched the baseline’s 45k-step accuracy in 20k steps, a 2.3x training speedup.\nMeanwhile, five objectives are co-trained rather than staged: T2I, T2V, TI2VA, ICL, and human-robot co-training. Sampling follows a coarse-to-fine schedule, from appearance grounding to video-action control. Keeping every objective alive avoids forgetting the earlier priors.\nHierarchical Planning\nChunk-level control cannot sequence long-horizon goals. Above the policy therefore sits a VLM planner, LoRA-finetuned with a frozen vision tower. It emits structured JSON: done, instruction, generation_instruction, local_scene_description. It runs at about 2 Hz behind an asynchronous shared buffer. The policy reads it at each chunk boundary, so planner latency never blocks execution.\nForesight Reasoning\nEven with a sparse backbone, deployment hits a serial bottleneck. If the robot waits, model latency becomes control latency.\nForesight Reasoning therefore runs prediction and execution as asynchronous streams. While the robot executes chunk a_t, the video expert imagines its outcome. The action expert decodes a_{t+1} from that.\nRunning ahead risks drift. So each returning observation is encoded into the true latent z_{t+1}, overwriting the imagined one. A forward-dynamics grounding loss trains the video expert for this role.\n# Pseudocode for the asynchronous rollout (Sec. 2.3.7, Eq. 29).\n# Not runnable: policy, executor and encode() are placeholders.\nC = init_kv_cache(encode(obs_0))            # feedback-grounded cache C_t\na = policy.action_expert(C)                 # cold start: first action chunk a_0\nwhile not done:\n    executor.start(a)                       # execution stream, non-blocking\n    C_tmp  = C + [a]                        # prediction stream: C_t u {a_t}\n    z_hat  = policy.video_expert(C_tmp)     # forward dynamics -\u003e imagined z_{t+1}\n    a_next = policy.action_expert(C_tmp + [z_hat])\n    obs = executor.wait()                   # real observation of a_t returns\n    C   = overwrite(C_tmp, z_hat, encode(obs))   # re-ground: z_hat \u003c- true z_{t+1}\n    a   = a_next\nPerformance\nConsequently, evaluation covers simulation and real hardware. On RoboTwin 2.0, every model trains on 2,500 clean plus 25,000 randomized demonstrations, across 50 tasks.\n\n| Method | Clean | Randomized | Avg. | \n| X-VLA | 72.9 | 72.8 | 72.9 | \n| π0.5 | 82.7 | 76.8 | 79.8 | \n| Motus | 88.7 | 87.0 | 87.9 | \n| LingBot-VA | 92.9 | 91.6 | 92.2 | \n| LingBot-VA 2.0 | 93.8 | 93.4 | 93.6 | \n| Acceleration technique | Inference time (ms/chunk) | Async Hz | \n| BF16 PyTorch async rollout baseline | 927 | 35 | \n| + Consistency distillation | 466 | 69 | \n| + Low-precision compiled execution | 369 | 87 | \n| + Long-horizon attention optimization | 272 | 118 | \n| + Runtime overhead reduction | 142 | 225 | \nDistillation cuts the video sampler from 5 steps to 2, and the action sampler from 10 to 2. FP8 TensorRT engines, a paged/ragged KV cache with FlashInfer attention, and host-side overhead removal supply the rest.\n# Reproduces Table 3 of the report exactly. Runnable as-is.\nK = 32  # low-level control steps inside one generated chunk\nstack = [(\"BF16 PyTorch async rollout baseline\", 927),\n         (\"+ Consistency distillation\",          466),\n         (\"+ Low-precision compiled execution\",  369),\n         (\"+ Long-horizon attention optimization\", 272),\n         (\"+ Runtime overhead reduction\",        142)]\nfor name, ms in stack:\n    print(f\"{name:40s} {ms:4d} ms  {round(1000 / ms * K):4d} Hz\")\nprint(\"end-to-end speedup:\", round(927 / 142, 1), \"x\")\nVersion 1.0 vs Version 2.0\n| Dimension | LingBot-VA | LingBot-VA 2.0 | \n| Tokenizer | Wan2.2 VAE (reconstruction) | Semantic visual-action tokenizer, 96 latent channels | \n| Backbone origin | Finetuned from a bidirectional generator | Causal DiT pretrained from scratch | \n| Video FFN | Dense | Sparse MoE, 128 experts, top-8 | \n| Extra supervision | Not used | MCP, in-context learning, human-robot co-training | \n| Inference | Async execution, KV cache | Foresight Reasoning with observation re-grounding | \n| Peak async control | Not reported in the version 2.0 report | 225 Hz | \nThe tokenizer ablation isolates row one. Swapping the WAN2.2 VAE for the semantic tokenizer lifts a 1.3B model from 78.0 to 86.6.\nUse Cases and Examples\nBeyond benchmarks, four deployment shapes stand out.\n- Few-shot onboarding: The report states the model adapts from 10 to 15 demonstrations. Real-world evaluation uses 20 teleoperated demos per task. One multi-task checkpoint covers all four evaluated tasks.\n- Demonstration-conditioned control: In-context learning lets a human demonstration video replace the text instruction. After finetuning on four seen tasks, the policy executed unseen compositions. One example: “put the calabash into the green plate.”\n- Cheap data scaling: Human-robot co-training retargets hand poses into the robot action space. Each hand becomes a virtual parallel gripper. The egocentric corpus spans 65.4k episodes.\n- Reactive control: Demonstrations include Air Hockey and a conveyor belt, where the policy anticipates moving objects.\nKey Takeaways\n- Pretrains a causal video-action DiT from scratch instead of adapting a video generator.\n- A semantic tokenizer puts world states and latent actions in one aligned space.\n- Sparse MoE video stream: ~2.5B of ~15.3B parameters activate per token.\n- Foresight Reasoning overlaps prediction with execution, re-grounded on every real observation.\n- Chunk latency 927 ms to 142 ms; async control 35 Hz to 225 Hz.\nInteractive Dynamic Explainer\nCheck out the Paper and Project Page. Also, feel free to follow us on Twitter and don’t forget to join our 150k+ML SubReddit and Subscribe to our Newsletter. Wait! are you on telegram? now you can join us on telegram as well.\nNeed to partner with us for promoting your GitHub Repo OR Hugging Face Page OR Product Release OR Webinar etc.? Connect with us\nNote:Thanks to the Ant Research team for the thought leadership/ Resources for this article. Ant Research team has supported this content/article for promotion.", "zh": false}, {"seq": 2, "title": "OpenAI 发布 GPT-5.6 系列医疗评估结果", "source": "X：Sam Altman (@sama)", "summary": "OpenAI 发布 GPT-5.6 系列在医疗领域的评估结果。最小变体 GPT-5.6 Luna 在最低推理强度下即超…", "url": "https://x.com/sama/status/2075985056846451123", "publishedAt": "2026-07-11T16:46:22.000Z", "exact": true, "content": "\n山姆·奥特曼！[OpenAI](assets/img/a3925485fe014d91.jpg)\n\n“医生发现 GPT-5.6 回复中的缺陷比医生编写的回复要少。”\n\n♥️ GPT-5.6 无论是在前沿还是在成本上都是健康方面向前迈出的一大步。\n这些模型推动了性价比的前沿，为所有人带来最好的健康情报。最小的变体 GPT-5.6 Luna，以最低的推理工作量进行评估，表现优于其他版本", "zh": true}]}, {"label": "产品发布/更新", "color": "#059669", "items": [{"seq": 3, "title": "Claude Code v2.1.207 发布", "source": "Claude Code：GitHub Releases（RSS）", "summary": "Claude Code v2.1.207 发布。Auto 模式在 Bedrock、Vertex AI 和 Foundr…", "url": "https://github.com/anthropics/claude-code/releases/tag/v2.1.207", "publishedAt": "2026-07-11T00:52:10.000Z", "exact": true, "content": "您使用另一个选项卡或窗口登录。重新加载以刷新您的会话。您在另一个选项卡或窗口中注销。重新加载以刷新您的会话。您在另一个选项卡或窗口上切换了帐户。重新加载以刷新您的会话。关闭警报\n现在无需在 Bedrock、Vertex AI 和 Foundry 上选择 CLAUDE_CODE_ENABLE_AUTO_MODE 选择即可使用自动模式；通过设置中的disableAutoMode禁用\n修复了在流式传输包含很长列表、表格、段落或代码块的响应时终端冻结和击键滞后的问题\n修复了非交互式运行（claude -p，SDK）中的远程管理设置被永久记录为同意的情况，而不会显示安全同意对话框\n修复了由良性系统生成的对话更新触发的虚假提示注入警告\n修复了自动更新程序在每个版本中覆盖 ~/.local/bin/claude 处的自定义启动器脚本或符号链接的问题； /doctor 现在报告外部管理的启动器\n修复了当唯一的输出重定向到 /dev/null 时，带有 cd 提示权限的复合命令\n修复了当响应完成流式传输时，文字记录会跳转到答案开头上方的问题\n修复了在删除最后一个 worktree.sparsePaths 工作树后，extensions.worktreeConfig 留在存储库的 .git/config 中（破坏 go-git 工具，如 tea）的问题\n修复了规则全局、技能路径、.ignore 和 .worktree 中格式错误的括号模式，包括破坏文件读取、文件建议和工作树创建\n修复了代理团队中的崩溃循环，其中格式错误的队友邮箱消息每秒导致重复错误，直到手动删除邮箱文件\n修复了后台会话通过接受未在其代理视图行上显示该名称的计划来自动命名的问题\n修复了从代理列表冷重新打开后进入 git 工作树的后台会话恢复为空白的问题\n修复了当连接从网络中断或凭据刷新中恢复时远程控制任务状态更新丢失的问题\n修复了桌面应用程序托管的远程控制会话不显示移动设备和 Web 上的后台代理和工作流程进度的问题\n修复了深度研究运行，将每个获取阶段代理标记为“未知”——芯片现在显示源主机名\n修复了 Bedrock 在每次 API 请求时反复从 IAM Identity Center 请求新的 AWS SSO 凭证的问题\n改进的代理视图：现在再次粘贴相同的文本会展开折叠的 [粘贴文本 #N] 占位符，而不是添加第二个占位符\n改进的代理视图：被阻止的会话查看现在会引发问题，并显示一个措辞陈旧的时钟（等待 3 分钟），而不是两次相同的时间戳\n将 AWS 上的 Bedrock、Vertex 和 Claude Platform 更改为默认为 Claude Opus 4.8\n更改了自动模式，不再从 .claude/settings.local.json （存储库驻留）读取 autoMode；使用 ~/.claude/settings.json 代替\n修复了当 AWS 凭证解析停止时 Windows 上的无限期挂起（例如，卡住的 credential_process）：现在会触发 60 秒的停止保护，而不是永远等待。\n插件 hooks/monitors/MCP headersHelper: shell 形式命令中的 ${user_config.*} 现在被拒绝（shell 注入修复）。挂钩：使用 exec 形式（args 数组）或 $CLAUDE_PLUGIN_OPTION_\u003cKEY\u003e；监视器和 headersHelper：读取脚本内的值（配置文件或服务器的环境块）。\n不再从项目级 .claude/settings.json 读取插件选项值 (pluginConfigs)；仅支持用户、--settings 和托管设置\n固定/使用积分金额输入默默地将格式错误的值（例如粘贴的时间戳）剥离为数字；现在，格式错误的金额会被拒绝并显示错误，超过 1,000 美元的金额需要打字确认", "zh": true}]}, {"label": "行业动态", "color": "#d97706", "items": [{"seq": 4, "title": "OpenAI GPT-5.6-Sol 删光 AI 创业者 Matt Shumer 的 Mac 硬盘", "source": "X：阿易 AI Notes (@AYi_AInotes)", "summary": "知名 AI 创业者 Matt Shumer 的 Mac 硬盘被 OpenAI 最新 Agent 模型 GPT-5.6-…", "url": "https://x.com/AYi_AInotes/status/2075761215251312722", "publishedAt": "2026-07-11T01:56:54.000Z", "exact": true, "content": "\n真是能力越强，破坏力越大啊！\n这个老哥Mac上的文件被OpenAI最顶的GPT-5.6-Sol删光了，估计所有跑本地AI Agent的人看到这个都得吓出一身冷汗🤯整个事件详细拆解，以及怎么避免类似悲剧发生👇\nGPT-5.6-Sol，OpenAI 刚发的最强 Agent 模型，把一个知名 AI 创业者的整个 Mac 硬盘，删光了。\nMatt Shumer，就是那个之前天天晒 Agent 自己跑一周做完整项目的哥们，今天给本地 Agent 开了 Full Access 全权限，让 subagent 做个简单的文件清理。\n结果 shell 变量解析炸了 ——$HOME路径没展开对，Agent 直接执行了rm -rf /Users/mattsdevbox。\n等他发现不对冲过去 kill 进程的时候，电脑里几年的代码、文件、照片，已经没了一大半。\n事后 Agent 自己生成了一份事故报告，老老实实承认是自己路径展开错了。\n认错态度很好，但删了的文件不会因为它道歉就回来啊！\n这件事最恐怖的地方其实还不是模型犯了错 ，而在于他说：这种 cleanup 任务，他之前已经让 Agent 跑过几百次，从来没出过问题。\n就这一次，模型在大家都觉得不可能出错的地方，犯了个最低级的错，结果就是不可逆的物理毁灭。\n咱们也别觉得这是他 prompt 写得烂，笑他不小心，\n其实这是现在整个 Agent 行业都在回避的死刑级真相：\n1. 哪怕是 GPT-5.6 这种顶级模型，照样会在变量展开、相对路径、shell 命令这种 “小事” 上翻车 —— 它完全懂你要 “清理垃圾文件”，但手滑一下，就是家目录没了\n2. Subagent + 长时自主运行 + 全权限 = 灾难放大器。一个最底层的小 review Agent 的错误，能直接炸穿你整个主机，能力越强，单点故障的破坏半径就越大，这根本不是 prompt 能解决的，是架构级的 bug\n3. “跑了几百次都没事” 是最致命的安全感。AI 的错误逻辑和人完全不一样，它不会像人一样 “熟能生巧”，就是会在你最放松、最不设防的时候，给你干票毁灭性的大的\n4. 模型厂商的安全底线从根上就不一样。OpenAI 的 Sol 追求极致能力和自主性，guardrail 基本裸奔；Anthropic 的 Fable 从设计上就更保守，对危险操作天生谨慎 —— 这也是为什么 Matt 事后第一句话是：“这就是我为什么 1000x 更信任 Fable”\n怎么避免呢❓ 所有现在在跑本地 Agent、给 AI 开过高权限的兄弟们，别等自己硬盘没了才后悔，现在立刻去做这几件事：\n#AI #Agent #GPT5 #Claude #OpenAI #Anthropic #AIAgent\n\nI'm so angry... the OpenAI team is looking into it, but this feels like something that should happen with GPT-3.5.\nNot a mid-2026 frontier model on the highest reasoning level.", "zh": true}, {"seq": 5, "title": "研究：博科圣地已使用ChatGPT、Claude等主流AI聊天机器人用于袭击策划与武器开发", "source": "The Decoder：AI News（RSS）", "summary": "剑桥大学CASP研究员Antonia Jülich对27名前成员的57次访谈显示，博科圣地已使用ChatGPT、Cla…", "url": "https://the-decoder.com/terrorist-groups-are-using-every-major-ai-chatbot-for-attack-planning-and-weapons-development", "publishedAt": "2026-07-11T17:04:28.000Z", "exact": true, "content": "恐怖组织正在使用每一个主要的人工智能聊天机器人来进行攻击计划和武器开发\n据报道，自 2023 年以来，ISIS 一直在提供及时的工程和越狱培训，并为尼日利亚的博科圣地指挥官提供了如何绕过人工智能安全过滤器的培训。\n剑桥人工智能科学与政策项目 (CASP) 研究员 Antonia Jülich 的一项新研究显示，博科圣地现在使用 ChatGPT、Claude、Gemini、Grok、Meta AI 和 DeepSeek 等流行的人工智能聊天机器人，并且其两个派别都设立了专门的人工智能单元。于利希对该组织的 27 名前成员进行了 57 次采访。\n研究发现，该组织利用人工智能进行攻击规划、制造更强大的爆炸装置、武器维护和操作安全。伊斯兰国联络员对指挥官进行了如何绕过安全过滤器的培训。博科圣地的两个派别都建立了自己的专用人工智能单位。根据尤利希的说法，他们“将高层人员聚集在一个房间里，并使用投影仪在大屏幕上展示它是如何工作的”。\n在一个特别疯狂的案例中，ISWAP 派系使用人工智能复制了电影中的摩托车跳跃技术，以便战士能够清理战壕。十八名战士在训练期间死亡。八人成功跳跃。\n但当然，它并不止于摩托车特技。 “前成员描述了对人工智能的强烈热情，一些人表示该组织之前曾考虑过制造大规模伤亡武器，”尤利希写道。 “尽管博科圣地对人工智能的使用仍然是传统的，但这应该是一个警告，要求认真对待恐怖分子寻求人工智能援助化学和生物武器的风险。”\n研究人员以及 OpenAI 和 Anthropic 等人工智能实验室长期以来一直警告说，人工智能模型可能会让危险知识更容易获取。但自愿的自我监管显然并不能解决问题，因为研究发现安全过滤器无法可靠地防止滥用。这可能就是大型语言模型的本质：Anthropic 最近承认越狱可能永远不会完全消除。\n研究人员还指出，像 ChatGPT 和 Claude 这样的聊天机器人虽然吸引了大多数公众的注意力，但并不是真正令人担忧的，因为它们大多只是让现有知识更容易找到，而不是产生任何新知识。更大的担忧是生命科学领域更专业的人工智能系统可能被滥用。\n没有炒作的人工智能新闻——由人类策划\n订阅 THE DECODER 即可享受无广告阅读、每周一次的 AI 时事通讯、我们每年六次的独家“AI 雷达”前沿报告、完整的存档访问权限以及我们的评论部分的访问权限。\n立即订阅", "zh": true}, {"seq": 6, "title": "11天Claude Fable 5写超100万行代码：Rust重构JavaScript运行时Bun", "source": "IT之家（RSS）", "summary": "开发者Jarred Sumner借助Claude Fable 5模型，11天内将Bun从Zig重写为Rust，64个实…", "url": "https://www.ithome.com/0/975/469.htm", "publishedAt": "2026-07-11T07:33:08.000Z", "exact": true, "content": "IT之家 7 月 11 日消息，开发者贾里德 · 萨姆纳（Jarred Sumner）于 7 月 8 日发布博文，宣布在 Claude Fable 5 模型的帮助下，耗时 11 天、耗费 16.5 万美元，已重构 JavaScript 运行时 Bun，从 Zig 完全重写为 Rust 语言。\n\n萨姆纳表示本次重构最主要的原因是提高可靠性，Zig 经常出现内存错误和崩溃，而且很难彻底修复。Rust 则能在编译时捕获许多此类错误。\n萨姆纳表示在重构过程中，64 个 Claude 实例并行运行 11 天，编写了超过 100 万行代码，而如果需要人工团队重构，需要 1 年时间。\n\n\nAPI 的费用约为 16.5 万美元（IT之家注：现汇率约合 111.9 万元人民币），不过 Bun 及其团队已于 2025 年 12 月被 Anthropic 收购，因此萨姆纳不必担心高昂的费用。\nBun v1.4.0 以 Canary 版本的形式发布，修复了 128 个错误，运行速度提高了约 2% 到 5%。\n\n\n\n广告声明：文内含有的对外跳转链接（包括不限于超链接、二维码、口令等形式），用于传递更多信息，节省甄选时间，结果仅供参考，IT之家所有文章均包含本声明。", "zh": true}, {"seq": 7, "title": "彭博社揭秘苹果起诉 OpenAI 内幕：前员工一句“哈哈”成窃密关键", "source": "IT之家（RSS）", "summary": "苹果起诉 OpenAI，指控前工程师 Chang Liu 离职时带走未归还的 MacBook、一名可分享内情的员工，并…", "url": "https://www.ithome.com/0/975/634.htm", "publishedAt": "2026-07-11T23:21:57.000Z", "exact": true, "content": "IT之家 7 月 12 日消息，据彭博社昨天报道，当 iPhone 工程师 Chang Liu 离开苹果，加入 OpenAI 硬件部门时，他带走的不只是多年以来累计的工作经验。\n\n根据苹果昨天提起的诉讼，Chang Liu 离职时带走了三样东西：一台始终未归还的 MacBook 工作机、一名可以持续分享内情的苹果员工，以及一项软件漏洞，让他可以在离开苹果后继续访问公司内网服务器。\nChang Liu 发现漏洞后，与他的同事 Alyssa Peng 分享道：“哈哈（LOL），我发现我还能访问网络存储，太搞笑了”。而 Alyssa Peng 则是回复道：“我准备好了”，并利用自己的电脑帮助 Chang Liu 获取更多机密信息。\n本次诉讼发生以前，苹果与 OpenAI 的关系就趋于紧张。两家公司本来是合作伙伴，如今却希望捷足先登 AI 硬件市场而成为竞争对手，意图重新定义消费者如何使用电子产品。\n据悉，双方矛盾的核心人物是前苹果高管 Tang Tan。该人曾负责设计 iPhone、Apple Watch 等多款产品，并在 2023 年底告知管理层即将离职，后来成为 OpenAI 首席硬件官。\nIT之家从原报道获悉，苹果甚至破天荒地允许他继续工作至 2024 年 2 月，好完成硬件部门的交接、对齐工作。然而在幕后，Tang Tan 已经密会前苹果首席设计官乔纳森 · 艾维及 OpenAI CEO 萨姆 · 奥尔特曼，希望打造一款全新的 AI 设备，未来有望挑战 iPhone。\n目前已有超 400 名员工从苹果跳槽至 OpenAI。这种大规模挖角很快引来了苹果警觉，因为 OpenAI 不仅挖走了多位硬件和设计部门高级主管，还重创了苹果多个工程团队。\n这种情况持续到了今年 6 月，当 OpenAI 挖走苹果智能眼镜负责人保罗 · 米德后，苹果要求其立即离职，并没有像 Tang Tan 那样给出交接时间。\n苹果认为，OpenAI 正试图复制 iPhone 的整套产品研发体系，并在诉状中表示：“OpenAI 尚处于起步阶段的硬件业务，如今建立在极其脆弱的根基之上，其核心已经从非法窃取而来的商业机密腐烂”。\n据一位与 Tang Tan 共事的不具名人士透露，他在苹果 25 年的职业生涯一直以大胆著称，甚至可以说是“飞得离太阳非常近”。\nTang Tan 因主导 Mac 笔记本和 iPod 设计而成名，随后负责初代 iPhone 的产品设计。2011 年起，他全面接管 iPhone 设计团队，之后又负责 Apple Watch 设计工作。离开苹果时，他已经跻身公司最高管理层。\n与此同时，OpenAI 已经向硬件业务砸了数十亿美元，并朝着 IPO 迈进。不过根据知情人士透露，OpenAI 收购乔纳森旗下 io Products 时，并没有真正成熟的产品。虽然公司曾经研究过耳机、智能眼镜以及 AI 音箱等方案，但最终还是决定研制一款可以取代智能手机的设备。\n苹果表示，公司在起诉 OpenAI 之前曾尝试过私了。苹果在今年 2 月主动联系过 OpenAI，告知其机密信息已经流出，要求 OpenAI 主动展开调查、防止类似事件再次发生。\n然而 OpenAI 并未作出回应，诉讼中点名的员工也没有回应媒体置评请求。\n此外，本次诉讼也进一步凸显了 Tang Tan 和苹果下一任 CEO 约翰 · 特努斯的紧张关系。据悉，特努斯曾是 Tang Tan 的上司，而 OpenAI 挖走的大多数苹果员工都来自特努斯掌管的硬件部门。\n广告声明：文内含有的对外跳转链接（包括不限于超链接、二维码、口令等形式），用于传递更多信息，节省甄选时间，结果仅供参考，IT之家所有文章均包含本声明。", "zh": true}]}, {"label": "技巧与观点", "color": "#0284c7", "items": [{"seq": 8, "title": "Ghost Font：一种人类能读懂但AI无法识别的反AI字体", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "summary": "Ghost Font 是一种利用运动、视频、噪点和诱饵来隐藏文字的反AI字体。用户输入文字后可生成并下载视频片段，视频…", "url": "https://www.mixfont.com/ghost-font", "publishedAt": "2026-07-11T16:31:09.615Z", "exact": true, "content": "混合字体\nMIXFONT幽灵字体\n一种反人工智能字体，人类可以阅读，但领先的人工智能模型无法阅读。在下面输入您的文字，然后下载并分享包含您的消息的视频剪辑。\n什么是幽灵字体？\nGhost Font 是一种反 AI 字体，它使用动作来编写消息。通过结合运动、视频、噪音和诱饵，这是一种与其他真人分享信息的独特方式。我想从技术上来说，它不是传统意义上的 TTF 字体文件的字体。但是，Ghost Font 是一种以人工智能无法轻易理解的格式以图形方式进行书面交流的实验。虽然它不如普通文本那么清晰，但这些字母仍然可以立即被人眼识别，但即使是领先的人工智能模型也无法轻松解读。\n使用 Ghost Font 生成的视频随后被传递到领先的 AI 模型，如 Claude Fable 和 GPT Sol 5.6 Ultra。即使是这些最近具有编码能力的特工，也很难解码移动消息，直到提示需要寻找的确切技术。\n上面的游乐场只是这个概念的原型。输入几个单词，字母就会出现，但这只是因为人眼可以看到点的运动。\n当视频暂停时，静态点混合在一起，仅通过查看单个帧就无法判断图像中嵌入了什么信息。这意味着对页面进行屏幕截图不会显示该消息。\n此实验在本地进行 - 输入消息并实时预览，或下载视频以共享并自行测试。数据不会共享或发送到任何服务器。\n关于这个项目\n2013年，设计师Sang Mun发布了一款名为ZXX的字体。它是一种具有四种字体的字体，设计目的是人类可读，但光学字符识别 (OCR) 软件无法读取。这些字母被噪音掩盖，被划掉，并埋在虚假标记下。当时，这种字体被认为是“防监视”的，但快进到今天，现代人工智能代理可以轻松读取 ZXX 中呈现的文本。\n虽然这可能在 2013 年击败了 OCR 软件，但现代 AI 模型可以非常轻松地读取 ZXX 中的文本。我在即时模式下将此图像复制到 ChatGPT 5.5 中，它仍然能够在单个提示中获取包括一些小细节的单词：\n然而，对于 Ghost Font 来说，同样的过程就不会那么容易了。 Ghost Font 的单个屏幕截图只会产生完全静态的图像，没有可读的文本。这是因为 Ghost Font 中的每个字母都是由看起来与背景完全相同的点组成，因此视频中的任何单个图像都不会透露有关该消息的任何信息：\n经过 19 分钟的分析，ChatGPT 5.5 Pro 产生了一条不存在的幻觉消息。\n然而，简单地在视频中隐藏消息并不是一个完美的解决方案。虽然在线模型环境可能无法从各个帧获取它，但具有本地代码执行环境的专用代理仍然可以分析点的运动并解码消息。 Ghost Font 以另一种分层方式解决了这个问题：每个视频生成中都包含诱饵消息。\n对于意志坚定的特工来说，诱饵消息是最后的伎俩。当寻找隐藏消息时，它可能首先找到诱饵消息，并认为这是视频中真正嵌入的消息。这就是 Ghost Font 能够隐藏信息的方式，甚至能够隐藏来自 Fable 和 GPT Sol 5.6 Ultra 等最强思维模型的信息。\n最终，真正隐藏消息的方法是使用加密或某种密钥。没有人工智能能够读取需要只有人类知道的特定密码才能解锁的消息。然而，该项目探讨是否有可能创建一个可共享文件，其中包含人工智能模型无法轻松读取的视觉消息。\n我们创建这个实验是为了探索人工智能感知的极限，同时也保留人类的某些东西。随着人工智能接管字体生成，我们希望人类将继续拥有独特的创意声音。\n接下来怎么办？\n我认为继续探索 Ghost Font 有一些有趣的含义。例如，将 Ghost Font 合并到验证码系统中会很有趣，因为当今大多数系统都可以轻松地通过人工智能来解决。在视频中使用动作将是一种使自动化机器人更难以破译的方法，但对于人类来说仍然相对容易阅读。\n在视觉感知方面，Ghost Font 也可能是衡量人工智能进展的一种有趣方式。目前，多模态模型是基于图像的，即使传递视频，它们通常也会将视频分割成帧并分析各个帧。在不久的将来，我认为将会出现一个能够直接读取文本的视频原生模型。\n最后一个教训是，人工智能确实正在变得非常好。虽然 Ghost Font 对于人工智能来说很难阅读，但对于人类来说也很难阅读！差距继续缩小。人工智能感知和多模式模型的未来将会很有趣。\n下一步，我计划将视频生成的代码作为开源项目发布 - 请继续关注！我还希望扩大尺寸并处理更长的文本字符串。我希望您喜欢这个实验，我很想听听您的想法。您可以在 X 上通过 @ericlu 找到我。\n- 埃里克", "zh": true}]}]};
function pad(n){return n<10?"0"+n:""+n;}
function toBeijingHuman(iso, ref, exact){
  const d=new Date(iso); const bj=new Date(d.getTime()+8*3600*1000);
  const Y=bj.getUTCFullYear(),M=bj.getUTCMonth()+1,D=bj.getUTCDate();
  const h=bj.getUTCHours(),m=bj.getUTCMinutes(); const hh=pad(h),mm=pad(m);
  if(!exact) return M+"月"+D+"日";
  const [rY,rM,rD]=ref.split("-").map(Number);
  if(Y===rY&&M===rM&&D===rD) return "今天 "+hh+":"+mm;
  const yest=new Date(rY,rM-1,rD); yest.setDate(yest.getDate()-1);
  if(Y===yest.getFullYear()&&M===yest.getMonth()+1&&D===yest.getDate()) return "昨天 "+hh+":"+mm;
  return M+"月"+D+"日 "+hh+":"+mm;
}
const meta=DATA.meta, sections=DATA.sections, ref=meta.reportDate;
const statsEl=document.getElementById("stats");
sections.forEach(s=>{const d=document.createElement("div");d.className="stat";
  d.innerHTML='<div class="n">'+s.items.length+'</div><div class="l">'+s.label+'</div>';statsEl.appendChild(d);});
const navEl=document.getElementById("nav");
sections.forEach((s,i)=>{const a=document.createElement("a");a.href="#sec-"+i;
  a.innerHTML=escapeHtml(s.label)+'<span class="c">'+s.items.length+'</span>';navEl.appendChild(a);});
const mainEl=document.getElementById("main");
sections.forEach((s,i)=>{
  const sec=document.createElement("section");sec.className="block";sec.id="sec-"+i;
  const head=document.createElement("div");head.className="sec-head";
  head.innerHTML='<span class="sec-dot" style="background:'+s.color+'"></span><h2>'+escapeHtml(s.label)+'</h2><span class="cnt">'+s.items.length+' 条</span>';
  sec.appendChild(head);
  const grid=document.createElement("div");grid.className="grid";
  s.items.forEach(it=>{
    const card=document.createElement("article");card.className="card";card.style.setProperty("--accent",s.color);
    const time=toBeijingHuman(it.publishedAt,ref,it.exact);const url=it.url||"#";
    card.innerHTML='<div class="top"><span class="seq">'+it.seq+'</span><span class="time">'+time+'</span></div>'+
      '<h3>'+escapeHtml(it.title)+'</h3><span class="chip">'+escapeHtml(it.source)+'</span>'+
      '<p class="summary">'+escapeHtml(it.summary)+'</p>'+
      '<a class="readmore" href="'+escapeAttr(url)+'" target="_blank" rel="noopener noreferrer" title="外部原文链接，可能需要访问境外站点">来源 ↗</a>';
    card.addEventListener("click", function(){ openReader(it); });
    const rm = card.querySelector(".readmore");
    rm.addEventListener("click", function(e){ e.stopPropagation(); });
    grid.appendChild(card);
  });
  sec.appendChild(grid);mainEl.appendChild(sec);
});
function escapeHtml(s){return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function escapeAttr(s){return escapeHtml(s);}
// 渲染正文：将 ![alt](src) 转为内联图片，其余文本按段落转义（防 XSS）
var _IMG_RE=/!\[([^\]]*)\]\(([^)\s]+)\)/g;
function renderRich(text){
  return (text||"").split(/\n{1,}/).map(function(p){
    p=p.trim(); if(!p) return '';
    var out=''; var last=0; var m; _IMG_RE.lastIndex=0;
    while((m=_IMG_RE.exec(p))!==null){
      out+=escapeHtml(p.slice(last,m.index));
      out+='<img class="r-img" src="'+escapeAttr(m[2])+'" alt="'+escapeAttr(m[1])+'" loading="lazy">';
      last=_IMG_RE.lastIndex;
    }
    out+=escapeHtml(p.slice(last));
    return '<p>'+out+'</p>';
  }).join("");
}
function openReader(it){
  const r=document.getElementById("reader");
  const content=(it.content||"").trim();
  const body=document.getElementById("readerBody");
  if(content.length>0){
    body.innerHTML=renderRich(content);
  }else{
    body.innerHTML='<p class="r-empty">暂未获取到该条新闻的全文镜像。'+(it.url?'可点击右下角「查看原文 ↗」前往原始报道。':'')+'</p>';
  }
  document.getElementById("readerTitle").textContent=it.title;
  document.getElementById("readerSource").textContent=it.source;
  const link=document.getElementById("readerLink");
  if(it.url){link.href=it.url;link.style.display="";}else{link.style.display="none";}
  r.hidden=false;document.body.style.overflow="hidden";
}
function closeReader(){const r=document.getElementById("reader");r.hidden=true;document.body.style.overflow="";}
document.getElementById("reader").addEventListener("click",function(e){if(e.target===this)closeReader();});
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeReader();});
