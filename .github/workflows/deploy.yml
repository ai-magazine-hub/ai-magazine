name: 部署 AI资讯杂志

on:
  push:
  schedule:
    # 每 2 小时一次（北京时间 02/04/06/08/10/12/14/16/18/20/22/00 的 :07 分）。
    # 关键背景：GitHub Actions 定时任务跑在共享基础设施上，实测常延迟 6–9 小时甚至被跳过；
    # 高频触发可自愈，配合 generate_archive.py 内置的「近 10 天缺口补抓」，保证不漏任何一天。
    - cron: '7 */2 * * *'
    # 23:59 北京收尾扫描（UTC 15:59）：在日期翻面前最后一扫，把当天 22:07–24:00 发布的
    # 实时流条目归回当天，闭合「深夜边界」漏抓窗口。
    - cron: '59 15 * * *'
  workflow_dispatch:       # 也支持手动触发（Actions 页面 → Run workflow），用于即时补抓/重部署

permissions:
  contents: write
  pages: write
  id-token: write

# push 与 schedule 用不同并发组，且取消在途任务 = false：
# 避免一次 push（很快）把正在跑的 schedule 抓取取消掉，从而导致当天漏抓。
concurrency:
  group: ai-magazine-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30        # 防御：即使翻译端点异常，也最多跑 30 分钟，避免占满超时拖死更新
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install trafilatura

      # 记录抓取前的期数与条目总数：
      # - 期数用于判断「是否新增了日期」；
      # - 条目总数用于判断「是否往已存在的当天补抓了实时流条目」。
      # 二者任一增长即提交，确保 merge_today_feed 的当日补抓被持久化（否则下一轮 checkout 会冲掉）。
      - name: 记录抓取前基线
        id: before
        run: |
          echo "dates=$(python -c "import json;print(len(json.load(open('archive.json'))))")" >> "$GITHUB_OUTPUT"
          echo "items=$(python -c "import json;print(sum(len(s.get('items',[])) for d in json.load(open('archive.json')).values() for s in d.get('sections',[])))")" >> "$GITHUB_OUTPUT"

      # 统一跑完整模式（增量抓取：已生成的天跳过，只补最近缺失的天；自动翻译+排版+渲染）。
      # push 也走完整模式 -> 任何时候推送代码都会顺带自愈补抓缺失的最近几天。
      - name: Generate / update archive
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python generate_archive.py

      # 当「新增了日期」或「条目总数增加」时提交并回推：
      # - 新增日期 -> 提交一次 -> 下一轮看到日期已存在 -> 期数不变 -> 跳过提交 -> 循环终止；
      # - 往已存在当天补抓实时流条目（merge_today_feed）-> 条目数增长 -> 同样提交持久化，避免被下一轮冲掉；
      #   因 merge 按 title/permalink 幂等去重，下一轮补抓数为 0 -> 条目数不变 -> 跳过提交 -> 循环终止。
      - name: 统计新增并提交（如有）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          DATES_AFTER=$(python -c "import json;print(len(json.load(open('archive.json'))))")
          ITEMS_AFTER=$(python -c "import json;print(sum(len(s.get('items',[])) for d in json.load(open('archive.json')).values() for s in d.get('sections',[])))")
          echo "dates_before=${{ steps.before.outputs.dates }} dates_after=$DATES_AFTER items_before=${{ steps.before.outputs.items }} items_after=$ITEMS_AFTER"
          if [ "$DATES_AFTER" -gt "${{ steps.before.outputs.dates }}" ] || [ "$ITEMS_AFTER" -gt "${{ steps.before.outputs.items }}" ]; then
            git pull --rebase --autostash
            git add archive.json index.html ai-daily.html "ai-daily-*.html" ratings_cache.json
            git commit -m "chore: 自动同步 AI HOT 日报（$(date -u +%Y-%m-%dT%H:%M:%SZ)）"
            git push
          else
            echo "无新增日期/条目，跳过提交"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
