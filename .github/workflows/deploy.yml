name: 部署 AI资讯杂志

on:
  push:                     # 推送即部署（含本文件的本次推送也会触发）
  schedule:
    - cron: '30 0 * * *'   # UTC 00:30 = 北京时间 08:30，主抓取（避开 AI HOT 日报 00:00:39Z 生成的抢跑竞态）
    - cron: '0 3 * * *'   # UTC 03:00 = 北京时间 11:00，二次兜底抓取，防早晨漏抓/发布延迟，零手动
  workflow_dispatch:       # 也支持手动触发

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30        # 防御：即使翻译端点异常，也最多跑 30 分钟，避免占满 6h 超时拖死更新
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install trafilatura

      - name: Generate / update archive
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            python generate_archive.py --render-only
          else
            python generate_archive.py
          fi

      # schedule / 手动触发时，把抓取产生的新日报与更新后的 archive.json 提交回仓库，
      # 否则新数据只存在于临时 runner、不会持久化，下次又从头抓取（甘特图无法自动更新）。
      - name: Commit updated archive & dailies
        if: ${{ github.event_name != 'push' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archive.json index.html ai-daily.html ratings_cache.json
          # 同时纳入可能新增的日报页
          git add "ai-daily-*.html" 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "无变化，跳过提交"
          else
            git commit -m "chore: 自动同步 AI HOT 日报（$(date -u +%Y-%m-%dT%H:%M:%SZ)）"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
